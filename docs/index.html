  <script id="3" type="application/vnd.observable.javascript" hidden="">
    morph = {
      // return "not running";
      let transformIndex = 0;
      let fromBeginning = true; // if true, starts with Passengers English
      // NOT the way to go:
      // document.addEventListener("keydown", (event) => {
      //   if (event.altKey) {
      //     console.log(`Alt or Option key down`);
      //     fromBeginning = true;
      //   }
      // });
      let cycle, lineIdx;
      if (fromBeginning) {
        cycle = 0;
        lineIdx = 0;
        state.laps = 0;
      } else {
        cycle = randInt(3);
        // make spinTo a less and thus a more evenly likely entry point:
        cycle = cycle == 2 && randInt(2) == 0 ? randInt(2) : cycle;
        lineIdx = randInt(lines.length);
        state.laps = cycle < 2 ? cycle : 0;
      }
      yield `setting off with cycle: ${cycle}, on lap: ${state.laps}, line: ${lineIdx}`;
      document.getElementById("line").innerHTML = lineLetters("");
      await delay(5000);
      console.log(
        `setting off with cycle: ${cycle}, on lap: ${state.laps}, line: ${lineIdx}`
      );
      if (cycle < 2) {
        let whichSpin = randInt(2) == 0 ? true : false;
        await spinTo(lines[lineIdx], whichSpin, 500);
      }
      await delay(5000);
      // always wait briefly
      let start = Date.now();
      while (state.laps < config.howManyLaps || config.loopForever) {
        for (cycle; cycle < 2; cycle++) {
          // the following seems like a bit of a hack:
          // but gives us an articular per lap reset
          let modelLines = [], shuffled = "";
          if (state.laps > 0) {
            modelLines = shuffle(lines.slice());
            shuffled = "shuffled";
            config.showLetter = 400;
            config.xFade = 240;
          } else {
            modelLines = lines.slice();
            shuffled = "not shuffled";
          }
          let lns = modelLines.slice();
          for (lineIdx; lineIdx < lns.length; lineIdx++) {
            let nextIdx = (lineIdx + 1) % lns.length;
            state.modelLine = modelLines[lineIdx];
            // speed variations
            if (state.laps > 0) {
              switch (lineIdx) {
                case 2:
                  config.showNums = 500;
                  config.xFade = 500;
                  break;
                case 4:
                  config.showNums = 150;
                  config.xFade = 60;
                  break;
                case 8:
                  config.showNums = 500;
                  config.xFade = 500;
                  break;
                case 9:
                  config.showNums = 150;
                  config.xFade = 60;
                  break;
                case 12:
                  config.showNums = 500;
                  config.xFade = 500;
                  break;
                case 13:
                  config.showNums = 150;
                  config.xFade = 60;
                  break;
                case 15:
                  config.showNums = 500;
                  config.xFade = 500;
                  break;
                case 16:
                  config.showNums = 150;
                  config.xFade = 60;
                  break;
                default:
                    config.showNums = 400;
                    config.xFade = 250;
              }
            } else {
              switch (lineIdx) {
                case 3:
                  config.showNums = 375;
                  config.xFade = 250;
                  break;
                case 6:
                  config.showNums = 500;
                  config.xFade = 500;
                  break;
                case 8:
                  config.showNums = 375;
                  config.xFade = 250;
                  break;
                case 9:
                  config.showNums = 500;
                  config.xFade = 500;
                  break;
                case 12:
                  config.showNums = 375;
                  config.xFade = 250;
                  break;
                case 15:
                  config.showNums = 375;
                  config.xFade = 250;
                  break;
                default:
                  config.showNums = 150;
                  config.xFade = 60;
              }
            } 
            await toNums();
            await delay(config.showNums * 2);

            // decide whether to redact
            // get all matches for possible redaction
            // we will switch based on a redaction phase calculated from lineIdx
            let phase = Math.floor(lineIdx / (lns.length / config.phases.length));
            if (true || state.laps % 2 == 0) { // even lap: no redaction
              // format elapsed milliseconds as MM:SS for clearer display
              let _elapsedMs = Date.now() - start;
              let _mins = Math.floor(_elapsedMs / 60000);
              let _secs = Math.floor((_elapsedMs % 60000) / 1000);
              let _elapsedFmt = String(_mins).padStart(2, "0") + ":" + String(_secs).padStart(2, "0");
              console.log(
                `lap: ${state.laps} (no redaction), lines: ${lineIdx} & ${nextIdx}, ${shuffled}, ${_elapsedFmt}`
              );
              yield `lap: ${state.laps} (no redaction), lines: ${lineIdx} & ${nextIdx}, ${shuffled}, ${_elapsedFmt}`;
              phase = -1;
            } else {
              console.log(
                `laps: ${state.laps} odd: redacting, phase ${phase}: ${config.phases[phase]}, lines: ${lineIdx} & ${nextIdx}, ${shuffled}`
              );
              yield `laps: ${state.laps} odd: redacting, phase ${phase}: ${config.phases[phase]}, lines: ${lineIdx} & ${nextIdx}, ${shuffled}`;
            }
            let match;
            switch (phase) {
              case 0: // A -> redact
                match = new RegExp(/[aAɑ]/, "g");
                lns[nextIdx] = redact(lns[nextIdx], match);
                break;
              case 1: // all vowels ->redact
                match = vowelsMatch;
                lns[nextIdx] = redactAll(lns[nextIdx], match);
                break;
              case 2: // all letters -> redact
                match = new RegExp("[" + transThru + "]", "g");
                lns[nextIdx] = redactAll(lns[nextIdx], match);
                break;
              case 3: // vowels -> " " otherwise -> redact
                match = vowelsMatch;
                lns[nextIdx] = redactAll(lns[nextIdx], match, " ");
                match = consonantsMatch;
                lns[nextIdx] = redactAll(lns[nextIdx], match);
                break;
              case 4: // all -> " "
                match = new RegExp("[" + transThru + "]", "g");
                lns[nextIdx] = redactFinal(lns[nextIdx], match, " ");
                break;
              default:
            }
            // choose and annotate transform
            state.transform = config.transforms[transformIndex];
            transformIndex = ++transformIndex % config.transforms.length;
            // the following is a bit of a hack:
            if (state.transform == "resolveL2R") {
              state.transform = "spinTo";
              state.resolveL2R = true;
            } else state.resolveL2R = false;
            // invoke chosen transform
            switch (state.transform) {
              case "spinTo":
                // can be with config.resolveL2R as either true or false
                await spinTo(lns[nextIdx]);
                break;
              // NOT USED:
              case "toPhrase":
                await toPhrase(lns[nextIdx]);
                break;
              // NOT USED:
              case "textMorph":
                await textMorph(lns[nextIdx]);
            }
            await delay(config.showLine);
            //
            // } // if using toSpecials
            //
            info(`Line ${lineIdx}: ${lns[nextIdx]}`, true);
          } // end loop through lines
          lineIdx = 0;
          state.laps = (state.laps + 1) % 2; // for the slowing down version
          info(`Lap count: ${state.laps}`, true);
        } // cycle loop
        // spinTo
        console.log(`spinning to ...`);
        yield `spinning to ...`;
        let theLine = lines[0];
        let spinFor = 13 * 1000;
        let whichSpin = randInt(2) == 0 ? true : false;
        await spinTo(theLine, whichSpin, spinFor);
        await delay(3 * 1000);
        if (state.laps < 1) break;
        cycle = 0;
        state.laps = 0;
        lineIdx = 0;
      } // end while
      console.log("Done");
    }
  </script>

    **Caroline**: Demo‘ing a redaction sequence which would normally start *after* lap `0` (after an initial, no-redaction lap). In the (grey area of the) cell below, change `1` to `0` and click the blue ‘play' button in order to see the non-redacted first lap. It is best, also, to refresh the notebook web page after clicking ‘play’. (‘Play’ = evaluate the current cell so as to register and use any new values.) Refresh is also the best way to start over.<br>

    For demo purposes, with `state.laps = 1` you will see a progressively redacted *shuffled* selection of ten lines from the collected data. (Note that if `state.laps = 0` the lines are *not* shuffled.) You’ll see two lines animated in each of five redaction ‘phases’, equally distributed over the selection of ten lines. These are:
    1. random 'A/a' -> redact character
    2. vowels -> redact
    3. all letters -> redact
    4. vowels -> redact, otherwise -> '&nbsp; ' (space)
    5. all letters -> '&nbsp; ' (space)

    The light blue text above gives an indication of what is going on at the time.

    Clearly, you will be able to conceive of other principles for redaction and/or more phases and/or non-equal distribution of phrases across the sequences of lines. The choice is *yours*.

    lineLetters = (line = lines[0]) => {

        let char = " ";

        template += `<span id="text${i}">`;
        template += `<span class="text invisible" style="left: calc(1ch * ${
          i + 1
        });">${char}</span>`;
        template += `<span class="text visible" style="left: calc(1ch * ${
          i + 1
        });">${char}</span>`;
        template += `</span>`;
      }
      return template;
    }

  <script id="29" type="application/vnd.observable.javascript" hidden="">
    crossfader = async function (selector = "text", msDelay = config.xFade + 10) {
      // if only crossfading one letter this function must be passed an id containing a (serial) digit
      if (/\d/.test(selector)) {
        // SINGLE LETTER REPLACEMENT
        let letterElem = document.getElementById(selector);
        let theElems = letterElem.children;
        let fadingTo = getElemFrom(theElems, "invisible").innerText;
        Array.from(theElems).forEach((elem) => {
          elem.classList.toggle("invisible");
          elem.classList.toggle("visible");
        });
        await delay(msDelay);
        getElemFrom(theElems, "invisible").innerHTML = getCharHTML(fadingTo);
      } else {
        // ALL class="text" ELEMENTS ARE TOGGLED
        // grab the values that we are fadingTo:
        let fadingTo = [];
        Array.from(
          document.getElementsByClassName(selector + " invisible")
        ).forEach((elem) => fadingTo.push(elem.innerText));
        // toggle the visibility of the selected elements:
        let theElems = Array.from(document.getElementsByClassName(selector));
        theElems.forEach((elem) => {
          elem.classList.toggle("invisible");
          elem.classList.toggle("visible");
        });
        await delay(msDelay);
        // put the new values in the now invisible elements:
        Array.from(
          document.getElementsByClassName(selector + " invisible")
        ).forEach((elem, index) => (elem.innerHTML = getCharHTML(fadingTo[index])));
      }
    }
  </script>
  <script id="30" type="application/vnd.observable.javascript" hidden="">
    csvLines = (data = csv) => {
      data = csv.split("\n");
      let lines = [];
      let maxLen = 0;
      for (let i = 0; i < data.length; i++) {
        let line = data[i];
        if (config.withSpaces) {
          // if set to false then no spaces between words
          // otherwise: one space between words and no trailing spaces
          while (line.indexOf(",,,") != -1) {
            line = line.replaceAll(",,,", ",,");
          }
          if (line.substr(line.length - 2) == ",,")
            line = line.substr(0, line.length - 2);
          line = line.replaceAll(",,", ", ,");
        }
        lines[i] = line
          .split(",")
          .slice(1)
          .join("");

  <script id="34" type="application/vnd.observable.javascript" hidden="">
    getNextChar = async (
      dchar,
      ochar,
      stepsLeft,
      a = ALPHA_LOOP,
      maxSteps = Math.ceil(ALPHA_LOOP.length / 2)
    ) => {
      let step = 1,
        nchar = "";
      if (ochar == " " && dchar == " ") {
        info(`shared space char`);
        return nchar; // do not mess with shared spaces
      }
      let ondx = a.indexOf(ochar); // index of origin char in alpha loop
      if (ondx < 0) throw "original character not in alpha loop"; // shouldn't happen
      let nndx = ondx; // so that the index of the next character can progress
      let dndx = a.indexOf(dchar); // index of destination char
      let distance = dndx - ondx;
      if (distance == 0) {
        info(`-- reached dchar: ${ochar} --`);
        return null;
      }
      let absDistance = Math.abs(distance);
      if (distance > 0) {
        step = absDistance <= maxSteps ? 1 : -1;
        if (step < 0) absDistance = a.length - dndx + ondx;
      } else {
        step = absDistance <= maxSteps ? -1 : 1;
        if (step > 0) absDistance = a.length - ondx + dndx;
      }
      if (
        stepsLeft >= absDistance &&
        heads() &&
        stepsLeft < Math.floor(maxSteps / 6)
      ) {
        await delay(config.xFade);
        info(`@getNextChar no change continue`);
        return null;
      }
      nndx = mod(nndx + step, a.length); // uses a mod function that handles negative ints
      nchar = a[nndx]; // .substr(nndx, 1);
      info(
        `from: ${ochar} to: ${dchar} nchar: ${nchar} abs: ${absDistance}, stepsLeft: ${stepsLeft} step: ${step}`
      );
      return nchar;
    }
  </script>

    redactFinal = (line, match, redactChar = config.redactChar) => {
      let redactables = Array.from(line.matchAll(match));
      if (redactables.length < 1) return line;
      let overrideRedact = randInt(redactables.length);
      let overrideChar = randInt(redactables.length);
      while (overrideChar == overrideRedact && redactables[overrideChar][0] != " ")
        overrideChar = randInt(redactables.length);
      // redactables.forEach(
      //   (rmatch) => (line = replaceAt(line, rmatch.index, redactChar))
      // );
      for (let idx = 0; idx < redactables.length; ++idx) {
        if (idx == overrideChar) continue;
        if (idx == overrideRedact)
          line = replaceAt(line, redactables[idx].index, config.redactChar);
        else line = replaceAt(line, redactables[idx].index, redactChar);
      }
      return line;
    }
  </script>

            // ... replace it with a number code
            getElemFrom(lineElems[j].children, "invisible").innerText = numStr;
          } else continue;

        for (let j = i; j < lineLength; ++j) {
